id: appellant brief review screen
event: review_appellant_brief
question: |
  Review your answers
review:
  - Edit: trial_court
    button: |
      **Trial court**
      
      % if defined("trial_court.name.first"):
      * name: ${ trial_court.name.full() }
      % endif
  - Edit: filed_date
    button: |
      **Write the date the case was filed in the lower court**:
      ${ filed_date }
  - Edit: decision_date
    button: |
      **What date did the lower court decide your case?**:
      ${ decision_date }
  - Edit: judge_name
    button: |
      **What was the name of the judge in the lower court?**:
      ${ judge_name }
  - Edit: docket_number
    button: |
      **Docket number**:
      ${ docket_number }
  - Edit: users.revisit
    button: |
      **Users**

      % for item in users:
        * ${ item }
      % endfor
  - Edit: other_parties.revisit
    button: |
      **Other parties**
      
      % for item in other_parties:
        * ${ item }
      % endfor
  - Edit: appeal_issues
    button: |
      **Issue(s) or claim(s) of error on appeal**:
      > ${ single_paragraph(appeal_issues) }
  - Edit: challenged_judgments
    button: |
      **Write the court decisions you want changed**:
      > ${ single_paragraph(challenged_judgments) }
  - Edit: appeal_facts
    button: |
      **Write all of the facts about your case**:
      > ${ single_paragraph(appeal_facts) }
  - Edit: appeal_arguments
    button: |
      **Write your argument**:
      > ${ single_paragraph(appeal_arguments) }
  - Edit: appeal_conclusion
    button: |
      **Write a summary of what you want from the court**:
      > ${ single_paragraph(appeal_conclusion) }
  - Edit: record_appendix_upload_question
    button: |
      **Exhibits attached?**
      
      % if record_appendix_upload_question:
      Yes
      % elif not record_appendix_upload_question:
      No
      % endif
  - note: |
      **Supporting exhibits**:
      
      % if record_appendix_document.exhibits.there_are_any:
      ${ record_appendix_document.exhibits.in_progress_exhibits }
      % else:
      You have not attached any exhibits yet
      % endif

      ${ record_appendix_document.exhibits.add_action() }
    css class: bg-secondary-subtle
    show if: record_appendix_upload_question

  - Edit: impounded_record_appendix
    button: |
      **Impounded documents attached?**

      % if impounded_record_appendix:
      Yes
      % else:
      No
      % endif

  - note: |
      **Impounded exhibits**:

      % if impounded_document.exhibits.there_are_any:
      ${ impounded_document.exhibits.in_progress_exhibits }
      % else:
      You have not attached any impounded exhibits yet
      % endif

      ${ impounded_document.exhibits.add_action() }
    css class: bg-secondary-subtle
    show if: impounded_record_appendix

  - Edit: filing_institution
    button: |
      **Filing and service method**

      % if filing_institution:
      You are incarcerated.
      % else:
      You are not incarcerated.
      % endif

      % if filing_mail:
      You will file/serve by mail.
      % endif

      % if filing_electronic:
      You will file/serve electronically.
      % endif
