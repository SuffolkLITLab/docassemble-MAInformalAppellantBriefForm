id: record appendix
question: |
  Do you have your record appendix?
subquestion: |
  If you are the appealing party, your informal brief must be accompanied by a separate document called the **Record Appendix**. The Record Appendix contains copies of all the documents filed in or created by the lower court or agency that are not impounded **and are relevant to the Appeals Court's review of the issues raised on appeal, including copies of all documents you have referenced in your informal brief.** There is a special procedure for filing "impounded" information that is described later in the interview and in section (d) (4) of the Informal Brief Guidance below.

  Examples of documents that must be included in the Record Appendix are the trial court docket sheet; the order(s), ruling(s), or judgment(s) that you challenge, including any findings of fact, memorandum of decision, or jury verdict slips; relevant exhibits filed in the lower court or agency; relevant motions, memoranda, pleadings, or other documents filed by the party filing the informal brief or the other party or parties to the case; and the notice(s) of appeal.
  
  **This program will format and paginate your documents with a table of contents.**

  If this is a civil case, then you, the appealing party, are responsible for giving the Appeals Court transcripts of any hearings that are relevant to the appeal. If this is a criminal case, the transcripts will be provided directly to the Appeals Court if you ordered them. Transcripts can be included in the Record Appendix, or they may be filed separately as they are. 
  
  **The Appeals Court may decline to consider arguments in an informal brief that are not supported by evidence in the Record Appendix or transcript(s).**

  Note that only materials that were presented to the lower court or agency may be included in the Record Appendix. If you wish to include materials that were not presented to the lower court or agency, you must file a motion in the Appeals Court seeking permission to do so. (Such motions are usually denied because the Appeals Court reviews the judge's decision based only on the information that was before the judge.)

  The appellee (party responding to an appeal) can also file a Record Appendix with the appellee brief. If they do, the appellee's Record Appendix will be called the "supplemental appendix." You may file a reply brief in response to the appellee brief and supplemental appendix, but you may not file another appendix.

  [Informal Brief Guidance](https://www.mass.gov/info-details/appeals-court-informal-brief-pilot-program)

  **You must file a record appendix on the next screen**

